<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SecureApp{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f4f4f4; color: #333; }

        nav {
            background: #1a1a2e;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        nav a { color: #e0e0e0; text-decoration: none; font-size: 14px; }
        nav a:hover { color: #ffffff; text-decoration: underline; }
        nav .brand { font-weight: bold; font-size: 16px; color: #69db7c; margin-right: auto; }

        .container { max-width: 860px; margin: 40px auto; padding: 0 20px; }

        .card {
            background: #fff;
            border-radius: 6px;
            padding: 28px 32px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }

        h1, h2, h3 { margin-bottom: 16px; }

        label { display: block; margin-bottom: 4px; font-size: 13px; font-weight: bold; }
        input[type=text], input[type=password], input[type=email], textarea {
            width: 100%; padding: 9px 12px; margin-bottom: 14px;
            border: 1px solid #ccc; border-radius: 4px; font-size: 14px;
        }
        textarea { height: 90px; resize: vertical; }

        .btn {
            display: inline-block; padding: 9px 20px; border: none;
            border-radius: 4px; cursor: pointer; font-size: 14px; text-decoration: none;
        }
        .btn-primary   { background: #1a1a2e; color: #fff; }
        .btn-primary:hover { background: #2a2a4e; }
        .btn-danger    { background: #cc0000; color: #fff; }
        .btn-danger:hover { background: #990000; }
        .btn-secondary { background: #ddd; color: #333; }

        .alert {
            padding: 10px 16px; border-radius: 4px;
            margin-bottom: 16px; font-size: 14px;
        }
        .alert-error   { background: #fdecea; color: #cc0000; border: 1px solid #f5c6c6; }
        .alert-success { background: #e6f4ea; color: #1e7e34; border: 1px solid #b7dfc0; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 10px 14px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f0f0f0; font-weight: bold; }
        tr:hover td { background: #fafafa; }

        .badge {
            display: inline-block; padding: 2px 10px; border-radius: 12px;
            font-size: 12px; font-weight: bold;
        }
        .badge-admin { background: #ff6b6b; color: #fff; }
        .badge-user  { background: #4dabf7; color: #fff; }

        /* SECURE: green annotation boxes replace the yellow vuln-note boxes */
        .sec-note {
            background: #ebfbee; border: 1px solid #40c057;
            border-left: 4px solid #2f9e44;
            padding: 10px 14px; border-radius: 4px;
            font-size: 12px; color: #1a5c2a; margin-bottom: 20px;
        }
        .sec-note strong { display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<nav>
    <span class="brand">&#10003; SecureApp </span>
    <a href="{{ url_for('index') }}">Home</a>
    {% if session.user_id %}
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('search') }}">Search</a>
        <a href="{{ url_for('profile', user_id=session.user_id) }}">My Profile</a>
        {% if session.role == 'admin' %}
            <a href="{{ url_for('admin') }}">Admin Panel</a>
        {% endif %}
        <a href="{{ url_for('logout') }}">Logout ({{ session.username }})</a>
    {% else %}
        <a href="{{ url_for('login') }}">Login</a>
        <a href="{{ url_for('register') }}">Register</a>
    {% endif %}
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
